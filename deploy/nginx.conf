# Nginx reverse proxy for the Mess Management app.
#
# Install: sudo cp deploy/nginx.conf /etc/nginx/sites-available/mess-management
#          sudo ln -s /etc/nginx/sites-available/mess-management /etc/nginx/sites-enabled/
#          sudo nginx -t && sudo systemctl reload nginx
#
# Then run Certbot to get HTTPS (it edits this file in place to add the
# certificate + a port-443 server block and an HTTP->HTTPS redirect):
#          sudo certbot --nginx -d your-domain.com
#
# Replace your-domain.com below before installing.

server {
    listen 80;
    listen [::]:80;
    server_name your-domain.com;

    # Next.js's own static asset chunks are already content-hashed and safe to
    # cache aggressively; everything else (pages, API routes) goes straight
    # through to the app so auth/session logic always sees a live request.
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_cache_valid 200 365d;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    client_max_body_size 10M;
}
